name: E2E tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # Without Supabase keys the dev server can't boot. Skip the job if
      # they aren't configured — better than a perpetually red CI badge.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if Supabase secrets are missing
        if: env.NEXT_PUBLIC_SUPABASE_URL == ''
        run: |
          echo "::warning::Skipping E2E — NEXT_PUBLIC_SUPABASE_URL secret not configured."
          exit 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
